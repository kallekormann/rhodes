# Rhodes development overrides — exposed ports, Mailpit, Studio direct access.

services:
  kong:
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000/tcp"
      - "${KONG_HTTPS_PORT:-8443}:8443/tcp"
    environment:
      KONG_NGINX_HTTP_CLIENT_HEADER_BUFFER_SIZE: 160k
      KONG_NGINX_HTTP_LARGE_CLIENT_HEADER_BUFFERS: 64 160k

  studio:
    ports:
      - "54323:3000"

  db:
    ports:
      - "${DEV_POSTGRES_PORT:-5433}:5432"

  supavisor:
    ports:
      - "${POOLER_PROXY_PORT_TRANSACTION:-6543}:6543"

  auth:
    environment:
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_ADMIN_EMAIL: auth@rhodes.local
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      # Full URLs required — GoTrue uses API_EXTERNAL_URL (:8000) as host for relative paths.
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: http://localhost:3001/app/auth/confirm
      GOTRUE_MAILER_URLPATHS_INVITE: http://localhost:3001/app/auth/confirm
      GOTRUE_MAILER_URLPATHS_RECOVERY: http://localhost:3001/app/auth/confirm
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: http://localhost:3001/app/auth/confirm

  ollama:
    ports:
      - "11434:11434"

  redis:
    ports:
      - "${DEV_REDIS_PORT:-6379}:6379"

  tika:
    ports:
      - "9998:9998"

  mailpit:
    container_name: rhodes-mailpit
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
