# Rhodes development overrides — exposed ports, Mailpit, Studio direct access.

services:
  kong:
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000/tcp"
      - "${KONG_HTTPS_PORT:-8443}:8443/tcp"
    environment:
      KONG_NGINX_HTTP_CLIENT_HEADER_BUFFER_SIZE: 160k
      KONG_NGINX_HTTP_LARGE_CLIENT_HEADER_BUFFERS: 64 160k

  studio:
    ports:
      - "54323:3000"

  db:
    ports:
      - "${DEV_POSTGRES_PORT:-5433}:5432"

  supavisor:
    ports:
      - "${POOLER_PROXY_PORT_TRANSACTION:-6543}:6543"

  auth:
    environment:
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_ADMIN_EMAIL: auth@rhodes.local
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      # Full URLs required — GoTrue uses API_EXTERNAL_URL (:8000) as host for relative paths.
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: http://localhost:3001/app/auth/confirm
      GOTRUE_MAILER_URLPATHS_INVITE: http://localhost:3001/app/auth/confirm
      GOTRUE_MAILER_URLPATHS_RECOVERY: http://localhost:3001/app/auth/confirm
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: http://localhost:3001/app/auth/confirm

  ollama:
    ports:
      - "11434:11434"

  redis:
    ports:
      - "${DEV_REDIS_PORT:-6379}:6379"

  tika:
    ports:
      - "9998:9998"

  mailpit:
    container_name: rhodes-mailpit
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      # Host 1026 avoids conflict with local MailHog on 127.0.0.1:1025 (common on macOS).
      - "1026:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # Hot-reload worker: mount monorepo, run tsx watch. restart: always from base compose.
  worker:
    working_dir: /app
    volumes:
      - ..:/app
      - ../.data:/app/.data
      - worker-node-modules:/app/node_modules
      - worker-app-node-modules:/app/apps/worker/node_modules
    environment:
      RHODES_IN_DOCKER: "1"
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      TIKA_URL: http://tika:9998
      OLLAMA_HOST: http://ollama:11434
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      RHODES_DATA_DIR: /app/.data
      RHODES_LIBRARY_DATA_DIR: /app/.data/library-files
      RHODES_DOCUMENT_IMAGES_DATA_DIR: /app/.data/document-images
    command:
      [
        "bash",
        "-c",
        "corepack enable && corepack prepare pnpm@10.27.0 --activate && pnpm install --filter @rhodes/worker... && pnpm --filter @rhodes/worker dev",
      ]

volumes:
  worker-node-modules:
  worker-app-node-modules: